spring:
  application:
    name: aau-sw3-p3
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5434/vudp
    username: vudp-user
    password: placeholder
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect # Tells JPA which database language to interpret

    hibernate:
      ddl-auto: create